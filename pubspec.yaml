  with live language switching, caching, and Google Translator support.
version: 1.0.0
homepage: https://github.com/jubayerhossain625/auto_translate_text_widget
topics:
  - translation
  - localization
  - text
  - google-translate
  - widgets

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  translator: ^1.0.3+1
  shared_preferences: ^2.5.3
  animated_text_kit: ^4.2.3
  auto_size_text: ^3.0.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

flutter:
